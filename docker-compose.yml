services:
  postgres:
    image: postgres:16.3-alpine
    container_name: rappi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rappi_tec}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rappi_tec}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  weather-ingestor:
    build:
      context: ./services/weather-ingestor
      dockerfile: Dockerfile
    container_name: weather-ingestor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rappi_tec}
      CSV_SIMULATION: ${CSV_SIMULATION:-0}
      OPEN_METEO_URL: https://api.open-meteo.com/v1/forecast?latitude=19.4326&longitude=-99.1332&timezone=America%2FMexico_City&current=temperature_2m,precipitation
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-300}

  superset-init:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: superset-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY is required}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rappi_tec}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:?SUPERSET_ADMIN_USERNAME is required}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD is required}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:?SUPERSET_ADMIN_EMAIL is required}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME:-Superset}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME:-Admin}
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade && \
        superset fab create-admin \
          --username "$$SUPERSET_ADMIN_USERNAME" \
          --firstname "$$SUPERSET_ADMIN_FIRSTNAME" \
          --lastname "$$SUPERSET_ADMIN_LASTNAME" \
          --email "$$SUPERSET_ADMIN_EMAIL" \
          --password "$$SUPERSET_ADMIN_PASSWORD" && \
        superset init
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    restart: "no"

  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: superset
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?SUPERSET_SECRET_KEY is required}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rappi_tec}
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    ports:
      - "8088:8088"
    command:
      - /bin/sh
      - -c
      - |
        superset run -h 0.0.0.0 -p 8088

volumes:
  postgres_data:
